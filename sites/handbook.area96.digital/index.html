<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Area96 Handbook</title>
    <style>
      body {
        font-family: monospace;
        height: 100vh;
        margin: 0;
        font-size: 10vh;
      }

      span {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
    <span>🚀 🔜</span>
  </body>
  <script type="module">
    // get twemoji
    import twemoji from "https://cdn.skypack.dev/twemoji";

    // replace text with twemoji
    twemoji.parse(document.body, {
      folder: "svg",
      ext: ".svg",
    });

    // fix twemoji size
    document.querySelectorAll("img").forEach((img) => {
      img.style.width = "1em";
      img.style.height = "1em";
    });
  </script>
</html>
